<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aria's Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- COPYRIGHT: diluar .portfolio, tidak ikut scroll -->
<div class="copyright">Copyright &copy; 2025 Aria Bimantara. All rights reserved.</div>

<canvas id="particles-canvas"></canvas>
<div class="portfolio">

  <!-- ROW 1: NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand" id="nav-brand">My Portfolio</div>
    <div class="nav-center">
      <button class="prof-btn active" data-prof="da" id="btn-da">Data Analyst</button>
      <button class="prof-btn" data-prof="qa" id="btn-qa">Quality Assurance</button>
    </div>
    <div class="nav-lang">
      <button class="lang-btn active" data-lang="en"><span class="flag"></span> EN</button>
      <button class="lang-btn" data-lang="id"><span class="flag"></span> ID</button>
    </div>
  </nav>

  <!-- ROW 2: HERO / PROFILE -->
  <div class="row-hero">
    <div class="photo-col">
      <img id="profile-photo" alt="Profile Photo" />
    </div>
    <div class="info-col">
      <div class="card about-card">
        <div class="about-header">
          <div class="about-header-left">
            <div class="card-title" id="label-about">About Me</div>
            <div class="about-name" id="about-name"></div>
            <div class="about-role" id="about-role"></div>
          </div>
          <div class="about-header-right">
            <a class="cv-btn cv-btn-primary" id="btn-cv-ats" href="#" target="_blank">Download CV</a>
          </div>
        </div>
        <div class="about-text" id="about-text"></div>
        <div class="stats-strip" id="stats-strip"></div>
      </div>
      <div class="info-bottom">
        <div class="card card-contact">
          <div class="card-title" id="label-contact">Contact</div>
          <div class="contact-col" id="contact-row"></div>
        </div>
        <div class="card card-edu">
          <div class="card-title" id="label-edu">Education</div>
          <div class="edu-grid" id="edu-grid"></div>
        </div>
        <div class="card card-cert">
          <div class="card-title" id="label-cert">Certifications</div>
          <div class="cert-grid" id="cert-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 3: SKILLS -->
  <div class="row-skills">
    <div class="card">
      <div class="card-title" id="label-tech">Technical Skills</div>
      <div class="skill-logos" id="skill-logos"></div>
    </div>
    <div class="card">
      <div class="card-title" id="label-soft">Soft Skills</div>
      <ul class="soft-list" id="soft-list"></ul>
    </div>
  </div>

  <!-- ROW 4: PROJECT EXPERIENCE -->
  <div class="card row-projects">
    <div class="card-title" id="label-proj">Project Experience</div>
    <div class="projects-scroll">
      <div class="project-grid" id="project-grid"></div>
    </div>
  </div>

</div>

<!-- ===== EDUCATION POPUP ===== -->
<div class="modal-overlay" id="edu-modal">
  <div class="modal-card">
    <button class="modal-close" id="modal-close-btn">✕</button>
    <div class="modal-header">
      <div class="modal-logo" id="modal-logo"></div>
      <div class="modal-judul" id="modal-judul"></div>
    </div>
    <div class="modal-prodi" id="modal-prodi"></div>
    <div class="modal-tanggal" id="modal-tanggal"></div>
    <div class="modal-divider"></div>
    <div class="modal-isi" id="modal-isi"></div>
  </div>
</div>

<!-- ===== CERTIFICATION POPUP ===== -->
<div class="modal-overlay" id="cert-modal">
  <div class="modal-card">
    <button class="modal-close" id="cert-close-btn">✕</button>
    <div class="modal-header">
      <div class="modal-logo" id="cert-modal-logo"></div>
      <div class="modal-judul" id="cert-modal-judul"></div>
    </div>
    <div class="modal-prodi" id="cert-modal-issuer"></div>
    <div class="modal-tanggal" id="cert-modal-year"></div>
    <div class="modal-divider"></div>
    <div class="modal-isi" id="cert-modal-desc"></div>
    <a class="cv-btn cv-btn-primary cert-view-btn" id="cert-view-btn" href="#" target="_blank">View Certification</a>
  </div>
</div>

<!-- ===== PROJECT POPUP (WIDE) ===== -->
<div class="modal-overlay" id="proj-modal">
  <div class="modal-card proj-modal-card">
    <button class="modal-close" id="proj-close-btn">✕</button>

    <!-- Cover image 16:9 -->
    <div class="proj-cover" id="proj-cover">
      <img id="proj-cover-img" alt="Project Cover" style="display:none" />
      <div class="proj-cover-placeholder" id="proj-cover-placeholder"></div>
    </div>

    <div class="proj-modal-body">
      <!-- Judul -->
      <div class="proj-modal-title" id="proj-modal-title"></div>

      <!-- Tombol (kiri, dinamis) + Tags (kanan) -->
      <div class="proj-modal-meta">
        <div class="proj-modal-btns" id="proj-modal-btns"></div>
        <div class="proj-modal-tags" id="proj-modal-tags"></div>
      </div>

      <div class="modal-divider"></div>

      <!-- Executive Summary: 2 kolom -->
      <div class="proj-sections" id="proj-sections"></div>
    </div>
  </div>
</div>

<!-- SVG ICON TEMPLATES -->
<template id="icon-location">
  <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/>
    <circle cx="12" cy="10" r="3"/>
  </svg>
</template>
<template id="icon-linkedin">
  <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/>
    <rect x="2" y="9" width="4" height="12"/>
    <circle cx="4" cy="4" r="2"/>
  </svg>
</template>
<template id="icon-email">
  <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
    <polyline points="22,6 12,13 2,6"/>
  </svg>
</template>
<template id="icon-calendar">
  <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/>
    <line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
</template>
<template id="icon-award">
  <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="6"/>
    <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
  </svg>
</template>
<template id="icon-tag">
  <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
    <line x1="7" y1="7" x2="7.01" y2="7"/>
  </svg>
</template>

<script src="script.js"></script>
</body>
</html>
